version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: edtech_postgres
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass123
      POSTGRES_DB: edtech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edtech_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d edtech_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: edtech_mlflow
    ports:
      - "5000:5000"
    environment:
      - BACKEND_URI=sqlite:///mlflow.db
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    networks:
      - edtech_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: edtech_api
    environment:
      DATABASE_URL: postgresql://devuser:devpass123@postgres:5432/edtech_db
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - edtech_network

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: edtech_ui
    environment:
      -AAPI_URL: http://api:8000/predict
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api
    networks:
      - edtech_network

volumes:
  postgres_data:
  mlflow_data:

networks:
  edtech_network:
    driver: bridge